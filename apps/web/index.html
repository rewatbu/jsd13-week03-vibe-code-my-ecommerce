<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Bean Store - ร้านเมล็ดกาแฟคุณภาพ</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" onclick="navigate('home')">
        <span class="logo-icon">☕</span>
        <span class="logo-text">Coffee Bean</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="#" onclick="navigate('home')">หน้าแรก</a>
        <a href="#" onclick="navigate('products')">สินค้า</a>
        <a href="#" id="navOrderHistory" style="display:none" onclick="navigate('orders')">คำสั่งซื้อ</a>
        <a href="#" id="navAdmin" style="display:none" onclick="navigate('admin')">จัดการร้านค้า</a>
      </div>
      <div class="nav-actions">
        <div class="cart-icon" onclick="navigate('cart')" id="cartIcon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </div>
        <div id="authButtons">
          <button class="btn btn-outline" onclick="navigate('login')">เข้าสู่ระบบ</button>
          <button class="btn btn-primary" onclick="navigate('register')">สมัครสมาชิก</button>
        </div>
        <div id="userMenu" style="display:none">
          <span class="user-greeting" id="userGreeting"></span>
          <button class="btn btn-outline btn-sm" onclick="logout()">ออกจากระบบ</button>
        </div>
      </div>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    </div>
  </nav>

  <main id="app"></main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <span class="logo-icon">☕</span>
        <span class="logo-text">Coffee Bean Store</span>
        <p>เมล็ดกาแฟคุณภาพ คัดสรรจากทั่วโลก</p>
      </div>
      <div class="footer-links">
        <h4>ติดต่อเรา</h4>
        <p>Email: info@coffeebean.com</p>
        <p>โทร: 02-123-4567</p>
        <p>ที่อยู่: 123 ถนนสุขุมวิท กรุงเทพฯ</p>
      </div>
      <div class="footer-links">
        <h4>ลิงก์ด่วน</h4>
        <a href="#" onclick="navigate('products')">สินค้าทั้งหมด</a>
        <a href="#" onclick="navigate('home')">หน้าแรก</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2024 Coffee Bean Store. สงวนลิขสิทธิ์ทุกประการ</p>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()"></div>

  <script src="app.js"></script>
</body>
</html>
